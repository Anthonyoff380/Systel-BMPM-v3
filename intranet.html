<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIO - PORTAIL INTRANET OPÉRATIONNEL</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #f4f7f9; display: flex; flex-direction: column; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #topbar { background: #1a202c; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e53e3e; }
    .intranet-main { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .portal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; width: 100%; max-width: 1000px; }
    .portal-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); transition: all 0.3s ease; text-decoration: none; color: inherit; border: 1px solid #e2e8f0; position: relative; }
    .portal-card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.15); border-color: #e53e3e; }
    .portal-img { width: 100%; height: 220px; object-fit: cover; background: #edf2f7; border-bottom: 1px solid #edf2f7; }
    .portal-content { padding: 25px; text-align: center; }
    .portal-title { font-size: 26px; font-weight: 900; color: #1a202c; margin-bottom: 8px; text-transform: uppercase; letter-spacing: -0.5px; }
    .portal-desc { color: #4a5568; font-size: 15px; font-weight: 500; line-height: 1.4; }
    .intranet-header { text-align: center; margin-bottom: 60px; }
    .intranet-header h1 { font-size: 42px; font-weight: 900; color: #1a202c; margin: 0; letter-spacing: -1.5px; }
    .intranet-header h1 span { color: #e53e3e; }
    .intranet-header p { font-size: 18px; color: #718096; font-weight: 600; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="topbar">
    <div style="font-size: 28px; font-weight: 900; letter-spacing: -1.5px; color: #e53e3e;">PIO</div>
    <div style="font-weight: 800; color: #a0aec0; font-size: 14px; letter-spacing: 1px;">PORTAIL INTRANET OPÉRATIONNEL</div>
    <div style="font-size: 16px; font-weight: 900; color: white;">BMPM</div>
  </div>

  <div class="intranet-main">
    <div class="intranet-header">
      <h1>INTRANET <span>BMPM</span></h1>
      <p>Intranet BMPM - Simulations</p>
    </div>

    <div class="portal-grid" id="portal-grid">
      <!-- Les tuiles seront injectées ici par JS -->
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    const savedIntra = localStorage.getItem('systel_intranet');
    const config = savedIntra ? JSON.parse(savedIntra) : INTRANET_CONFIG;
    
    const grid = document.getElementById('portal-grid');
    grid.innerHTML = config.items.map(item => `
      <a href="${item.url}" class="portal-card">
        <img src="${item.img}" class="portal-img" alt="${item.title}">
        <div class="portal-content">
          <div class="portal-title">${item.title}</div>
          <div class="portal-desc">${item.desc}</div>
        </div>
      </a>
    `).join('');
  </script>
</body>
</html>
