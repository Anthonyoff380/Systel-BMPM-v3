<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INTRANET - Centre PTR</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #f4f7f9; display: flex; flex-direction: column; height: 100vh; margin: 0; }
    #topbar { background: #1a202c; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e53e3e; }
    .intranet-main { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .portal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; width: 100%; max-width: 900px; }
    .portal-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: all 0.3s ease; text-decoration: none; color: inherit; border: 1px solid #e2e8f0; }
    .portal-card:hover { transform: translateY(-10px); box-shadow: 0 20px 35px rgba(0,0,0,0.1); border-color: #e53e3e; }
    .portal-img { width: 100%; height: 200px; object-fit: cover; background: #edf2f7; }
    .portal-content { padding: 25px; text-align: center; }
    .portal-title { font-size: 24px; font-weight: 800; color: #2d3748; margin-bottom: 10px; text-transform: uppercase; }
    .portal-desc { color: #718096; font-size: 14px; line-height: 1.5; }
    .intranet-header { text-align: center; margin-bottom: 50px; }
    .intranet-header h1 { font-size: 36px; font-weight: 900; color: #1a202c; margin: 0; }
    .intranet-header h1 span { color: #e53e3e; }
  </style>
</head>
<body>
  <div id="topbar">
    <div style="font-size: 24px; font-weight: 900; letter-spacing: -1px;">SYS<span>TEL</span></div>
    <div style="font-weight: 700; color: #a0aec0;">PORTAIL INTRANET OPÉRATIONNEL</div>
    <div style="font-size: 13px; font-weight: 800;">CENTRE PTR</div>
  </div>

  <div class="intranet-main">
    <div class="intranet-header">
      <h1 id="intra-title">PORTAIL <span>INTRANET</span></h1>
      <p id="intra-subtitle" style="color: #718096; font-weight: 600;">Centre de Secours PTR - Marseille</p>
    </div>

    <div class="portal-grid" id="portal-grid">
      <!-- Les tuiles seront injectées ici par JS -->
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    // Charger les données dynamiques
    const savedIntra = localStorage.getItem('systel_intranet');
    const config = savedIntra ? JSON.parse(savedIntra) : INTRANET_CONFIG;
    
    document.getElementById('intra-title').innerHTML = config.title.replace('INTRANET', '<span>INTRANET</span>');
    document.getElementById('intra-subtitle').textContent = config.subtitle;

    const grid = document.getElementById('portal-grid');
    grid.innerHTML = config.items.map(item => `
      <a href="${item.url}" class="portal-card">
        <img src="${item.img}" class="portal-img" alt="${item.title}">
        <div class="portal-content">
          <div class="portal-title">${item.title}</div>
          <div class="portal-desc">${item.desc}</div>
        </div>
      </a>
    `).join('');
  </script>
</body>
</html>
