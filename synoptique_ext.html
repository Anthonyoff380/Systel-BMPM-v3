<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>SYNOPTIQUE TV — PTR</title>
  <script src="js/sounds.js"></script>
  <script src="js/data.js"></script>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; background:#0d1117; color:white; font-family:'Inter','Segoe UI',system-ui,sans-serif; overflow:hidden; }

    /* ===== HEADER ===== */
    .tv-header {
      background:#161b22; border-bottom:3px solid #e53e3e;
      padding:10px 28px; display:flex; justify-content:space-between; align-items:center; height:60px;
    }
    .tv-logo { font-size:22px; font-weight:900; letter-spacing:-1px; }
    .tv-logo span { color:#e53e3e; }
    .tv-info { display:flex; gap:28px; align-items:center; }
    .tv-info-item { display:flex; flex-direction:column; align-items:center; }
    .tv-info-label { font-size:9px; color:#4a5568; text-transform:uppercase; letter-spacing:0.5px; font-weight:700; }
    .tv-info-val { font-size:13px; font-weight:800; color:#e2e8f0; }
    .tv-info-val.red { color:#e53e3e; font-size:20px; }
    .tv-clock { font-size:26px; font-weight:900; color:#e53e3e; font-variant-numeric:tabular-nums; }

    /* ===== LAYOUT ===== */
    .tv-body {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:0;
      height:calc(100vh - 60px);
      overflow:hidden;
    }
    .tv-col { padding:14px 16px; overflow-y:auto; border-right:1px solid #21262d; }
    .tv-col:last-child { border-right:none; }
    .tv-col-title {
      font-size:10px; font-weight:800; color:#4a5568; text-transform:uppercase;
      letter-spacing:1px; margin-bottom:10px; padding-bottom:6px;
      border-bottom:1px solid #21262d; display:flex; justify-content:space-between;
    }
    .tv-col-count { background:#e53e3e; color:white; font-size:9px; font-weight:800; padding:1px 7px; border-radius:10px; }

    /* ===== ENGINS ===== */
    .centre-group { margin-bottom:12px; }
    .centre-name { font-size:10px; font-weight:700; color:#4a5568; text-transform:uppercase; letter-spacing:1px; padding:4px 0; border-bottom:1px solid #21262d; margin-bottom:6px; }
    .section-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .section-label { font-size:10px; color:#718096; font-weight:700; min-width:70px; flex-shrink:0; }
    .section-engins { display:flex; flex-wrap:wrap; gap:5px; }
    .engin-box-tv {
      padding:5px 12px; border-radius:5px; font-size:11px; font-weight:800;
      border:2px solid rgba(255,255,255,0.12); background:#1a202c; color:#e2e8f0;
      display:flex; align-items:center; gap:4px; cursor:default; position:relative;
    }
    .engin-box-tv.disponible { background:#0d2818; border-color:#166534; color:#68d391; }
    .engin-box-tv.indisponible { background:#2d1010; border-color:#7f1d1d; color:#fc8181; }
    .engin-box-tv.intervention { border-width:2px; }
    .engin-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .dot-dispo { background:#38a169; }
    .dot-indispo { background:#e53e3e; }
    .dot-inter { background:#f97316; animation:pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .ber-sup { font-size:9px; font-weight:900; padding:1px 4px; border-radius:3px; margin-left:2px; }

    /* ===== INTERVENTIONS ===== */
    .inter-card-tv {
      background:#161b22; border:1px solid rgba(255,255,255,0.07); border-radius:8px;
      margin-bottom:8px; overflow:hidden;
    }
    .inter-card-top { padding:10px 14px; cursor:pointer; transition:background 0.15s; }
    .inter-card-top:hover { background:rgba(255,255,255,0.03); }
    .inter-num { font-size:13px; font-weight:900; color:#e53e3e; }
    .inter-meta { display:flex; gap:14px; align-items:center; margin-top:3px; }
    .inter-date-tv { font-size:10px; color:#4a5568; }
    .inter-type-tv { font-size:12px; font-weight:800; color:#e2e8f0; flex:1; }
    .inter-lieu-tv { font-size:11px; color:#718096; }
    .inter-badge { background:#e53e3e; color:white; font-size:9px; font-weight:800; padding:2px 8px; border-radius:10px; flex-shrink:0; }
    .inter-body { display:none; padding:8px 14px 10px; border-top:1px solid rgba(255,255,255,0.05); background:rgba(0,0,0,0.2); }
    .inter-body.open { display:block; }
    .inter-engins-row { display:flex; flex-wrap:wrap; gap:5px; margin:6px 0; }
    .inter-engin-chip {
      padding:3px 10px; border-radius:4px; font-size:10px; font-weight:800;
      border:1.5px solid; display:flex; align-items:center; gap:4px;
    }
    .inter-svcs { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:6px; }
    .inter-svc-chip { background:rgba(255,255,255,0.07); color:#718096; font-size:9px; font-weight:700; padding:1px 6px; border-radius:3px; }
    .inter-obs-tv { font-size:10px; color:#718096; font-style:italic; margin-top:4px; }

    /* ===== VIDE ===== */
    .tv-empty { text-align:center; padding:40px; color:#2d3748; font-size:13px; }

    /* ===== TICKER ===== */
    .tv-ticker {
      position:fixed; bottom:0; left:0; right:0; height:28px;
      background:#161b22; border-top:1px solid #21262d;
      overflow:hidden; display:flex; align-items:center;
    }
    .ticker-inner { display:flex; gap:60px; animation:ticker 30s linear infinite; white-space:nowrap; }
    @keyframes ticker { from{transform:translateX(100vw);} to{transform:translateX(-100%);} }
    .ticker-item { font-size:11px; color:#718096; }
    .ticker-item span { color:#e53e3e; font-weight:700; }
  </style>
</head>
<body>

<div class="tv-header">
  <div class="tv-logo">SYS<span>TEL</span> <span style="font-size:12px;color:#4a5568;font-weight:500;">Synoptique TV</span></div>
  <div class="tv-info">
    <div class="tv-info-item"><span class="tv-info-label">Centre</span><span class="tv-info-val" id="tv-centre">PTR</span></div>
    <div class="tv-info-item"><span class="tv-info-label">Garde</span><span class="tv-info-val" id="tv-garde">--</span></div>
    <div class="tv-info-item"><span class="tv-info-label">Interventions</span><span class="tv-info-val red" id="tv-nb-inter">0</span></div>
    <div class="tv-info-item"><span class="tv-info-label">Engins engagés</span><span class="tv-info-val red" id="tv-nb-engins">0</span></div>
  </div>
  <div class="tv-clock" id="tv-clock">--:--:--</div>
</div>

<div class="tv-body">
  <!-- COL GAUCHE : SYNOPTIQUE ENGINS -->
  <div class="tv-col">
    <div class="tv-col-title">
      <span>🚒 Disponibilité des engins</span>
      <span class="tv-col-count" id="engins-count">0</span>
    </div>
    <div id="tv-engins-container"></div>
  </div>
  <!-- COL DROITE : INTERVENTIONS -->
  <div class="tv-col">
    <div class="tv-col-title">
      <span>🚨 Interventions en cours</span>
      <span class="tv-col-count" id="inter-count">0</span>
    </div>
    <div id="tv-inter-container"></div>
  </div>
</div>

<div class="tv-ticker">
  <div class="ticker-inner" id="tv-ticker"></div>
</div>

<script>
function ld(k) { try { const v=localStorage.getItem('systel_'+k); return v?JSON.parse(v):null; } catch(e){return null;} }

function chargerTout() {
  const cfg=ld('config'); if(cfg) Object.assign(CONFIG,cfg);
  const cas=ld('casernes'); if(cas) CASERNES=cas;
  const eng=ld('engins'); if(eng) ENGINS=eng;
  const ivs=ld('interventions'); if(ivs) INTERVENTIONS=ivs;
}

function fmtTime(d){ return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function fmtDT(d){ return d.toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }

function renderTout() {
  chargerTout();
  const now = new Date();
  // Clock
  document.getElementById('tv-clock').textContent = now.toLocaleTimeString('fr-FR');
  document.getElementById('tv-centre').textContent = CONFIG?.centre || 'PTR';
  document.getElementById('tv-garde').textContent = CONFIG?.typeGarde || '--';

  // Stats
  const enCours = INTERVENTIONS.filter(i => i.statut === 'En cours');
  const nbEngins = enCours.reduce((a,i) => a+(i.engins||[]).length, 0);
  document.getElementById('tv-nb-inter').textContent = enCours.length;
  document.getElementById('tv-nb-engins').textContent = nbEngins;
  document.getElementById('inter-count').textContent = enCours.length;
  document.getElementById('engins-count').textContent = ENGINS.length;

  // Synoptique engins
  const engContainer = document.getElementById('tv-engins-container');
  engContainer.innerHTML = CASERNES.map(centre => {
    const sectionsHTML = centre.sections.map(section => {
      const engs = ENGINS.filter(e => e.section === section.id);
      if (engs.length === 0) return '';
      const engHTML = engs.map(e => {
        const ber = e.berStatut ? BER_STATUTS.find(b => b.code === e.berStatut) : null;
        const boxStyle = ber?.couleur ? `background:${ber.couleur}22;border-color:${ber.couleur};color:white;` : '';
        const dotCls = e.statut==='disponible'?'dot-dispo':e.statut==='indisponible'?'dot-indispo':'dot-inter';
        return `<div class="engin-box-tv ${e.statut}" style="${boxStyle}" title="${ber?.label||e.statut}">
          <span class="engin-dot ${dotCls}"></span>
          ${e.nom}
          ${ber ? `<span class="ber-sup" style="background:${ber.couleur||'#e53e3e'};color:white;">${ber.code}</span>` : ''}
        </div>`;
      }).join('');
      return `<div class="section-row">
        <span class="section-label">${section.nom}</span>
        <div class="section-engins">${engHTML}</div>
      </div>`;
    }).join('');
    if (!sectionsHTML.trim()) return '';
    return `<div class="centre-group">
      <div class="centre-name">${centre.nom}</div>
      ${sectionsHTML}
    </div>`;
  }).join('') || '<div class="tv-empty">Aucun engin configuré</div>';

  // Interventions
  const interContainer = document.getElementById('tv-inter-container');
  if (enCours.length === 0) {
    interContainer.innerHTML = '<div class="tv-empty">✅ Aucune intervention en cours</div>';
  } else {
    interContainer.innerHTML = enCours.map(inter => {
      const engHTML = (inter.engins||[]).map(eId => {
        const e = ENGINS.find(x => x.id === eId);
        if (!e) return '';
        const ber = e.berStatut ? BER_STATUTS.find(b => b.code === e.berStatut) : null;
        const style = ber?.couleur ? `background:${ber.couleur}22;border-color:${ber.couleur};color:${ber.couleur};` : 'border-color:#f97316;color:#f97316;background:rgba(249,115,22,0.1);';
        return `<div class="inter-engin-chip" style="${style}">
          <span style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;animation:pulse 1.2s infinite;"></span>
          ${e.nom}${ber?` (${ber.code})`:''}
        </div>`;
      }).join('');
      const svcsHTML = (inter.services||[]).slice(0,5).map(s => `<span class="inter-svc-chip">${s}</span>`).join('');
      const dt = inter.date ? fmtDT(new Date(inter.date)) : '--';
      return `<div class="inter-card-tv">
        <div class="inter-card-top" onclick="this.nextElementSibling.classList.toggle('open')">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="inter-num">#${inter.numero||inter.id}</span>
            <span class="inter-badge">EN COURS</span>
          </div>
          <div class="inter-meta">
            <span class="inter-date-tv">${dt}</span>
            <span class="inter-type-tv">${inter.type||'INTERVENTION'}</span>
          </div>
          <div class="inter-lieu-tv">📍 ${inter.adresse||'--'}</div>
        </div>
        <div class="inter-body">
          ${svcsHTML ? '<div class="inter-svcs">'+svcsHTML+'</div>' : ''}
          <div class="inter-engins-row">${engHTML||'<span style="color:#4a5568;font-size:11px;">Aucun engin</span>'}</div>
          ${inter.observations ? `<div class="inter-obs-tv">${inter.observations}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  // Ticker
  const tickerItems = enCours.map(i => `<span class="ticker-item"><span>#${i.numero||i.id}</span> ${i.type||''} — ${i.adresse||''}</span>`);
  if (tickerItems.length === 0) tickerItems.push('<span class="ticker-item">✅ Aucune intervention en cours</span>');
  const ticker = document.getElementById('tv-ticker');
  ticker.innerHTML = [...tickerItems, ...tickerItems].join('<span class="ticker-item" style="color:#2d3748;">|</span>');
}

renderTout();
setInterval(renderTout, 3000);
</script>
</body>
</html>
